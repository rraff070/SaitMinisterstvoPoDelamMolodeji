{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Вход в систему</h2>

        <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="login-form">
            <div class="form-group">
                <label for="username">Номер телефона</label>
                <input type="text" id="username" name="username" required
                       placeholder="+7(999)999-99-99" class="phone-input">
                <small class="form-text">Введите номер в формате: +7(999)999-99-99</small>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required
                       placeholder="Введите пароль">
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="remember" name="remember">
                    Запомнить меня
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Войти</button>
        </form>

        <div class="auth-links">
            <p>Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
            <p><a href="{{ url_for('forgot_password') }}">Забыли пароль?</a></p>
        </div>


    </div>
</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 200px);
    padding: 2rem;
}

.auth-card {
    background: var(--color-white);
    border-radius: 10px;
    padding: 2rem;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 400px;
}

.auth-card h2 {
    color: var(--color-primary-dark);
    margin-bottom: 1.5rem;
    text-align: center;
}

.auth-form .form-group {
    margin-bottom: 1.5rem;
}

.auth-form label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--color-text);
    font-weight: 500;
}

.auth-form input {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1rem;
    transition: border-color 0.3s;
}

.auth-form input:focus {
    outline: none;
    border-color: var(--color-accent);
}

.phone-input {
    font-family: monospace;
    font-size: 1.1rem;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: normal;
    cursor: pointer;
}

.checkbox-label input[type="checkbox"] {
    width: auto;
    margin-right: 0.5rem;
}

.form-text {
    display: block;
    margin-top: 0.25rem;
    font-size: 0.85rem;
    color: var(--color-text-light);
}

.btn-block {
    width: 100%;
    padding: 0.75rem;
    font-size: 1.1rem;
}

.auth-links {
    margin-top: 1.5rem;
    text-align: center;
}

.auth-links a {
    color: var(--color-accent);
    text-decoration: none;
    font-weight: 500;
}

.auth-links a:hover {
    text-decoration: underline;
}

.auth-links p {
    margin: 0.5rem 0;
}

.auth-info {
    margin-top: 2rem;
    padding: 1rem;
    background-color: #f8f9fa;
    border-radius: 5px;
    font-size: 0.9rem;
    color: var(--color-text-light);
}

.auth-info p {
    margin: 0.25rem 0;
}
</style>

<script>
// Маска для телефона
document.getElementById('username').addEventListener('input', function(e) {
    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
    e.target.value = !x[2] ? x[1] : '+7(' + x[2] + ')' + (x[3] ? x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
});

// Автоматическая отправка формы (без изменений)
document.getElementById('login-form').addEventListener('submit', function(e) {
    // Форма отправляется как обычно
});
</script>
{% endblock %}
