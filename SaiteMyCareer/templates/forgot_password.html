{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Восстановление пароля</h2>
        
        <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form" id="forgot-form">
            <div class="form-group">
                <label for="username">Номер телефона</label>
                <input type="text" id="username" name="username" required 
                       placeholder="Введите номер телефона">
            </div>
            
            <div class="form-group">
                <label for="secret_word">Кодовое слово</label>
                <input type="text" id="secret_word" name="secret_word" required 
                       placeholder="Введите кодовое слово">
                <small class="form-text">Слово, которое вы указали при регистрации</small>
            </div>
            
            <div class="form-group">
                <label for="new_password">Новый пароль</label>
                <input type="password" id="new_password" name="new_password" required minlength="4">
                <small class="form-text">Минимум 4 символа</small>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Подтвердите пароль</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="4">
            </div>
            
            <div id="password-error" class="error-message" style="display: none; color: red; margin-bottom: 1rem;">
                Пароли не совпадают
            </div>
            
            <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Восстановить пароль</button>
        </form>
        
        <div class="auth-links">
            <p><a href="{{ url_for('login') }}">Вернуться к входу</a></p>
            <p><a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
        </div>
    </div>
</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 200px);
    padding: 2rem;
}

.auth-card {
    background: var(--color-white);
    border-radius: 10px;
    padding: 2rem;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 400px;
}

.auth-card h2 {
    color: var(--color-primary-dark);
    margin-bottom: 1.5rem;
    text-align: center;
}

.auth-form .form-group {
    margin-bottom: 1.5rem;
}

.auth-form label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--color-text);
    font-weight: 500;
}

.auth-form input {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1rem;
    transition: border-color 0.3s;
}

.auth-form input:focus {
    outline: none;
    border-color: var(--color-accent);
}

.form-text {
    display: block;
    margin-top: 0.25rem;
    font-size: 0.85rem;
    color: var(--color-text-light);
}

.btn-block {
    width: 100%;
    padding: 0.75rem;
    font-size: 1.1rem;
    margin-top: 1rem;
}

.auth-links {
    margin-top: 1.5rem;
    text-align: center;
}

.auth-links a {
    color: var(--color-accent);
    text-decoration: none;
    font-weight: 500;
}

.auth-links a:hover {
    text-decoration: underline;
}

.auth-links p {
    margin: 0.5rem 0;
}

.error-message {
    color: #dc3545;
    font-size: 0.9rem;
    margin-top: 0.25rem;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const newPassword = document.getElementById('new_password');
    const confirmPassword = document.getElementById('confirm_password');
    const submitBtn = document.getElementById('submit-btn');
    const errorDiv = document.getElementById('password-error');
    const form = document.getElementById('forgot-form');
    
    function checkPasswords() {
        if (newPassword.value && confirmPassword.value) {
            if (newPassword.value !== confirmPassword.value) {
                errorDiv.style.display = 'block';
                submitBtn.disabled = true;
                return false;
            } else {
                errorDiv.style.display = 'none';
                submitBtn.disabled = false;
                return true;
            }
        } else {
            errorDiv.style.display = 'none';
            submitBtn.disabled = false;
            return true;
        }
    }
    
    newPassword.addEventListener('input', checkPasswords);
    confirmPassword.addEventListener('input', checkPasswords);
    
    form.addEventListener('submit', function(e) {
        if (newPassword.value !== confirmPassword.value) {
            e.preventDefault();
            errorDiv.style.display = 'block';
            confirmPassword.focus();
        }
    });
});
</script>
{% endblock %}
